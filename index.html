<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magubane NM Bank</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js Engine CDN -->
    <!--script src="https://jsdelivr.net"></script!-->
</head>
    <!-- Auth Section (Login & Registration) -->
    <div id="auth-container" class="container">
        <h2 id="auth-title">Client Login</h2>
     <body class="dark-theme">

    <!-- The button sits outside the login box, centered cleanly at the very top -->
    <button id="theme-toggle" onclick="bankApp.toggleTheme()">🌓 Toggle Theme</button>
   
        <input type="text" id="username" placeholder="Enter Your Username">
        <input type="password" id="password" placeholder="Enter Your password">
        
        <div id="reg-extra-fields" class="hidden">
            <input type="number" id="init-balance" placeholder="Initial Deposit Amount (R)" min="10" step="0.01">
        </div>

        <button id="primary-auth-btn" onclick="bankApp.handleAuth()">Authenticate</button>
        
        <p class="toggle-auth-msg">
            <span id="auth-switch-text">New client?</span> 
            <a href="#" id="auth-toggle-link" onclick="bankApp.switchAuthMode(event)">Create an account</a>
        </p>
        <p id="auth-error" class="error"></p>
    </div>

    <!-- Main Banking App Section -->
    <div id="dashboard-container" class="container hidden">
        <div class="header">
            <h2>Welcome,to Magubane<span id="user-display">User</span>!</h2>
            <button onclick="bankApp.logout()" class="btn-logout">Logout</button>
        </div>
        
        <div class="balance-card">
            <h3>Your Available Balance</h3>
            <p id="balance-display">R00.00</p>
        </div>

        <!-- Chart Matrix Visualization -->
        <div class="chart-container">
            <canvas id="balanceChart"></canvas>
        </div>

        <div class="actions">
            <h3>Execute Financial Transaction</h3>
            <input type="number" id="amount-input" placeholder="Amount (R)" min="0.01" step="0.01">
            <div class="btn-group">
                <button onclick="bankApp.handleTransaction('deposit')" class="btn-deposit">Deposit</button>
                <button onclick="bankApp.handleTransaction('withdraw')" class="btn-withdraw">Withdraw</button>
            </div>
            <p id="tx-error" class="error"></p>
        </div>

        <div class="history">
            <h3>Transaction History</h3>
            <!-- Example of what it should look like in index.html -->
<div id="transaction-history-list">
    <!-- JavaScript will dynamically drop the items right here! -->
</div>
            <ul id="transaction-history"></ul>
        </div>
    </div>

    <!-- Important: Your JavaScript logic file must be explicitly named app.js -->
    <script src="app.js"></script>
</body>
</html>
